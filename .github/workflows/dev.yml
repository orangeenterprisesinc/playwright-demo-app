trigger-playwright:
  name: Trigger Playwright Automation
  needs: deploy
  runs-on: ubuntu-latest

  steps:
    - name: Trigger Automation Repository
      shell: bash
      run: |
        echo "Triggering Playwright Repository..."

        STATUS=$(curl -s \
          -o response.txt \
          -w "%{http_code}" \
          -X POST \
          -H "Accept: application/vnd.github+json" \
          -H "Authorization: Bearer ${{ secrets.PAT_TOKEN }}" \
          -H "X-GitHub-Api-Version: 2022-11-28" \
          "https://api.github.com/repos/Gukapriyan/playwright-typescript-framework/dispatches" \
          -d '{"event_type":"run-playwright"}')

        echo "======================================="
        echo "HTTP Status: $STATUS"
        echo "======================================="
        echo "Response:"
        cat response.txt

        if [ "$STATUS" != "204" ]; then
          echo "Repository dispatch failed!"
          exit 1
        fi

        echo "Repository dispatch successful!"
